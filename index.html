<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Team-Karte v14 - Live Status</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet-control-geocoder/dist/Control.Geocoder.css" />
    <style>
        body, html { margin: 0; padding: 0; height: 100%; font-family: 'Segoe UI', sans-serif; overflow: hidden; }
        #map { height: 100vh; width: 100%; background: #ddd; }
        
        .overlay {
            position: absolute; top: 10px; right: 10px; z-index: 1000;
            background: rgba(255, 255, 255, 0.95); padding: 12px; border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2); min-width: 150px;
        }

        .slot-picker {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.85); z-index: 2000; display: flex;
            align-items: center; justify-content: center; color: white;
        }
        .picker-content { background: #222; padding: 30px; border-radius: 20px; text-align: center; border: 1px solid #444; }
        
        .slot-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin: 20px 0; }
        .slot-btn { 
            padding: 15px; border: none; border-radius: 8px; font-weight: bold;
            cursor: pointer; transition: 0.2s; background: #444; color: white;
        }
        .slot-btn.free { background: #27ae60; }
        .slot-btn.taken { background: #c0392b; opacity: 0.6; cursor: not-allowed; }
        .slot-btn:hover:not(.taken) { transform: scale(1.05); }

        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div id="slot-screen" class="slot-picker hidden">
        <div class="picker-content">
            <h2>Wer bist du?</h2>
            <div id="name-setup">
                <input type="text" id="name-input" placeholder="Dein Name..." style="padding:10px; border-radius:5px; border:none; width:80%;">
                <p id="scan-msg" style="margin-top:20px; font-size: 0.9em; color: #aaa;">Scanne Netzwerk...</p>
            </div>
            <div id="slot-list" class="slot-grid"></div>
            <button onclick="clearData()" style="color: #666; background: none; border: none; cursor: pointer; text-decoration: underline;">Daten zurücksetzen</button>
        </div>
    </div>

    <div class="overlay">
        <strong><span id="display-name">...</span></strong><br>
        <small id="status-text" style="color:orange;">Initialisiere...</small>
        <hr style="margin:8px 0; border:0; border-top:1px solid #eee;">
        Partner online: <span id="peer-count">0</span>
    </div>

    <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://unpkg.com/leaflet-control-geocoder/dist/Control.Geocoder.js"></script>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>

    <script>
        const ROOM_PREFIX = "at-v14-"; 
        let myName = localStorage.getItem('map_name');
        let mySlot = localStorage.getItem('map_slot');
        let peer, map;
        let markers = {};
        let connections = {};
        let isFirstLocate = true;

        window.onload = init;

        function init() {
            map = L.map('map', { zoomControl: false }).setView([47.6, 13.3], 7);
            const tunnelUrl = 'https://output-studio-jobs-able.trycloudflare.com';
            
            L.tileLayer(tunnelUrl + '/styles/basic-preview/{z}/{x}/{y}.png', {
                maxZoom: 20, 
                errorTileUrl: 'https://tile.openstreetmap.org/{z}/{x}/{y}.png'
            }).addTo(map);

            L.Control.geocoder({ position: 'topleft' }).addTo(map);

            if (!myName || !mySlot) {
                showSlotPicker();
            } else {
                document.getElementById('display-name').innerText = myName;
                startNetworking(mySlot);
            }
        }

        async function showSlotPicker() {
            const screen = document.getElementById('slot-screen');
            screen.classList.remove('hidden');
            const list = document.getElementById('slot-list');
            list.innerHTML = "";
            
            const scanner = new Peer(); 
            
            setTimeout(async () => {
                for (let i = 1; i <= 8; i++) {
                    const btn = document.createElement('button');
                    btn.className = "slot-btn";
                    btn.innerText = i;
                    
                    const conn = scanner.connect(ROOM_PREFIX + i);
                    let timeout = setTimeout(() => {
                        btn.classList.add('free');
                        btn.onclick = () => selectSlot(i);
                        conn.close();
                    }, 1500);

                    conn.on('open', () => {
                        clearTimeout(timeout);
                        btn.classList.add('taken');
                        btn.disabled = true;
                        conn.close();
                    });
                    list.appendChild(btn);
                }
                document.getElementById('scan-msg').innerText = "Wähle einen grünen Slot:";
            }, 800);
        }

        function selectSlot(num) {
            const nameInput = document.getElementById('name-input').value;
            if (!nameInput && !myName) { alert("Bitte Namen eingeben!"); return; }
            if (!myName) localStorage.setItem('map_name', nameInput);
            localStorage.setItem('map_slot', num);
            location.reload();
        }

        function startNetworking(slotNum) {
            peer = new Peer(ROOM_PREFIX + slotNum, {
                config: {'iceServers': [{ 'urls': 'stun:stun.l.google.com:19302' }]}
            });

            peer.on('open', () => {
                document.getElementById('status-text').innerText = "Online (Slot " + slotNum + ")";
                document.getElementById('status-text').style.color = "green";
                startTracking();
                setInterval(searchPartners, 10000);
            });

            peer.on('error', (err) => {
                if (err.type === 'id-taken') {
                    alert("Dieser Slot ist leider besetzt.");
                    localStorage.removeItem('map_slot');
                    location.reload();
                }
            });

            peer.on('connection', handleConn);
        }

        function startTracking() {
            map.locate({ watch: true, setView: false, enableHighAccuracy: true });
            map.on('locationfound', (e) => {
                if (isFirstLocate) { map.setView(e.latlng, 15); isFirstLocate = false; }
                const pos = { lat: e.latlng.lat, lon: e.latlng.lng, name: myName };
                updateMarker('me', pos);
                broadcast(pos);
            });
        }

        function handleConn(conn) {
            if (connections[conn.peer]) return;
            connections[conn.peer] = conn;
            conn.on('data', (data) => {
                if (data && data.lat && data.lon) updateMarker(conn.peer, data);
            });
            conn.on('close', () => {
                if (markers[conn.peer]) map.removeLayer(markers[conn.peer]);
                delete connections[conn.peer];
                updateUI();
            });
        }

        function searchPartners() {
            for (let i = 1; i <= 8; i++) {
                const target = ROOM_PREFIX + i;
                if (target !== ROOM_PREFIX + mySlot && (!connections[target] || !connections[target].open)) {
                    handleConn(peer.connect(target));
                }
            }
            updateUI();
        }

        function broadcast(data) {
            Object.values(connections).forEach(c => { if(c.open) c.send(data); });
        }

        function updateMarker(id, data) {
            const isMe = id === 'me';
            const now = new Date().toLocaleTimeString();
            
            // Verhindert perfektes Überlappen (Spider-Effekt)
            let displayLat = data.lat;
            let displayLon = data.lon;
            if (!isMe) {
                displayLat += (Math.random() - 0.5) * 0.0001;
                displayLon += (Math.random() - 0.5) * 0.0001;
            }

            if (!markers[id]) {
                const color = isMe ? '#3498db' : '#e74c3c';
                markers[id] = L.circleMarker([displayLat, displayLon], {
                    radius: 11, 
                    fillColor: color, 
                    color: "white", 
                    weight: 3, 
                    fillOpacity: 0.9,
                    zIndexOffset: isMe ? 1000 : 0 
                }).addTo(map);

                markers[id].bindTooltip(isMe ? "Ich" : data.name, { 
                    permanent: true, 
                    direction: 'top', 
                    offset: [0, -12] 
                });
            } else {
                markers[id].setLatLng([displayLat, displayLon]);
            }

            // Popup mit letztem Zeitstempel aktualisieren
            const popupContent = `
                <div style="text-align: center; font-size: 13px;">
                    <strong>${data.name}</strong><br>
                    <span style="color: #666;">
                        ${isMe ? "Deine Position" : "Zuletzt online: <b>" + now + "</b>"}
                    </span>
                </div>
            `;
            markers[id].bindPopup(popupContent);
        }

        function updateUI() {
            document.getElementById('peer-count').innerText = Object.values(connections).filter(c=>c.open).length;
        }

        function clearData() { localStorage.clear(); location.reload(); }
    </script>
</body>
</html>
