<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Map - AutoTeam</title>

    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet-control-geocoder/dist/Control.Geocoder.css" />
    
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://unpkg.com/leaflet-control-geocoder/dist/Control.Geocoder.js"></script>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>

    <style>
        body, html { margin: 0; padding: 0; height: 100%; font-family: sans-serif; }
        #map { height: 100vh; width: 100%; }
        .status-box {
            position: absolute; top: 10px; right: 10px; z-index: 1000;
            background: white; padding: 12px; border-radius: 8px; border: 1px solid #ccc; box-shadow: 0 2px 5px rgba(0,0,0,0.2);
        }
    </style>
</head>
<body>

    <div class="status-box">
        <strong>Status:</strong> <span id="status">Suche Partner...</span><br>
        <strong>Partner aktiv:</strong> <span id="peer-count">0</span>
    </div>
    <div id="map"></div>

    <script>
        // 1. Karte & Tiles
        var map = L.map('map').setView([47.6, 13.3], 7);
        var markers = {};
        var connections = {};
        const ROOM_PREFIX = "at-map-z10-"; // Dein privater "Kanal"

        L.tileLayer('https://eddie-cigarette-cleared-tooth.trycloudflare.com/styles/basic-preview/{z}/{x}/{y}.png', {
            maxZoom: 20,
            attribution: 'Österreich Live Map'
        }).addTo(map);
        map.setMaxZoom(20);
        L.Control.geocoder().addTo(map);

        // 2. PeerJS mit fester ID-Logik
        // Erzeugt eine ID wie "at-map-z10-12345"
        const myShortId = Math.floor(Math.random() * 10000);
        const peer = new Peer(ROOM_PREFIX + myShortId);
        let myLastPos = null;

        peer.on('open', (id) => {
            console.log('Eingeloggt als:', id);
            autoDiscovery(id);
        });

        // 3. Standort-Logik
        map.locate({setView: true, maxZoom: 15, watch: true});

        map.on('locationfound', (e) => {
            myLastPos = { lat: e.latlng.lat, lon: e.latlng.lng };
            if (!markers["me"]) {
                markers["me"] = L.marker(e.latlng, {zIndexOffset: 1000}).addTo(map).bindPopup("Ich").openPopup();
            } else {
                markers["me"].setLatLng(e.latlng);
            }
            // Position an alle aktiven Partner senden
            Object.values(connections).forEach(conn => {
                if (conn.open) conn.send(myLastPos);
            });
        });

        // 4. Automatische Partnersuche (Scannt den "Kanal")
        async function autoDiscovery(myFullId) {
            document.getElementById('status').innerText = "Scanne Kanal...";
            
            // Da PeerJS keine Liste bietet, "pingen" wir einfach die Umgebung an
            // Wir warten kurz, bis andere online kommen könnten
            setInterval(() => {
                // In einer einfachen Version warten wir auf eingehende Anrufe
                // oder du könntest hier eine Liste von IDs probieren.
                // PeerJS verbindet sich automatisch, wenn jemand deine ID "kennt"
            }, 5000);
        }

        // Empfange Verbindungen von anderen
        peer.on('connection', (conn) => {
            setupConn(conn);
        });

        function setupConn(conn) {
            if (connections[conn.peer]) return; // Schon verbunden
            
            connections[conn.peer] = conn;
            conn.on('data', (data) => {
                if (data.lat && data.lon) {
                    if (!markers[conn.peer]) {
                        markers[conn.peer] = L.marker([data.lat, data.lon]).addTo(map).bindPopup("Partner");
                    } else {
                        markers[conn.peer].setLatLng([data.lat, data.lon]);
                    }
                    updateCount();
                }
            });
            conn.on('open', () => {
                if (myLastPos) conn.send(myLastPos);
                updateCount();
            });
            conn.on('close', () => {
                map.removeLayer(markers[conn.peer]);
                delete connections[conn.peer];
                updateCount();
            });
        }

        function updateCount() {
            const count = Object.keys(connections).length;
            document.getElementById('peer-count').innerText = count;
            document.getElementById('status').innerText = count > 0 ? "Live verbunden" : "Warte auf Partner...";
        }

    </script>
</body>
</html>
