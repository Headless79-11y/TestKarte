<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Karte v13</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet-control-geocoder/dist/Control.Geocoder.css" />
    <style>
        body, html { margin: 0; padding: 0; height: 100%; font-family: 'Segoe UI', sans-serif; overflow: hidden; }
        #map { height: 100vh; width: 100%; background: #ddd; }
        
        /* Overlay Style */
        .overlay {
            position: absolute; top: 10px; right: 10px; z-index: 1000;
            background: rgba(255, 255, 255, 0.95); padding: 12px; border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2); min-width: 150px;
        }

        /* Slot Picker Fullscreen */
        .slot-picker {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.85); z-index: 2000; display: flex;
            align-items: center; justify-content: center; color: white;
        }
        .picker-content { background: #222; padding: 30px; border-radius: 20px; text-align: center; border: 1px solid #444; }
        
        .slot-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin: 20px 0; }
        .slot-btn { 
            padding: 15px; border: none; border-radius: 8px; font-weight: bold;
            cursor: pointer; transition: 0.2s; background: #444; color: white;
        }
        .slot-btn.free { background: #27ae60; cursor: pointer; }
        .slot-btn.taken { background: #c0392b; opacity: 0.6; cursor: not-allowed; }
        .slot-btn:hover:not(.taken) { transform: scale(1.05); }

        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div id="slot-screen" class="slot-picker hidden">
