<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Map5</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet-control-geocoder/dist/Control.Geocoder.css" />
    <style>
        body, html { margin: 0; padding: 0; height: 100%; font-family: sans-serif; overflow: hidden; }
        #map { height: 100vh; width: 100%; background: #eee; }
        .status-box {
            position: absolute; bottom: 20px; right: 10px; z-index: 1000;
            background: white; padding: 15px; border-radius: 8px; border: 1px solid #333;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3); min-width: 180px;
        }
    </style>
</head>
<body>
    <div class="status-box">
        <strong>Gerät:</strong> <span id="display-name">...</span><br>
        <strong>Netzwerk:</strong> <span id="status" style="color: orange;">Initialisiere...</span><br>
        <strong>Partner:</strong> <span id="peer-count">0</span>
        <div id="debug-log" style="font-size: 10px; color: #666; margin-top: 5px;"></div>
    </div>
    <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://unpkg.com/leaflet-control-geocoder/dist/Control.Geocoder.js"></script>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>

    <script>
        const log = (msg) => { document.getElementById('debug-log').innerText = msg; console.log(msg); };
        
        window.onload = () => {
            let myName = localStorage.getItem('chatName') || prompt("Name?", "User-" + Math.floor(Math.random()*100));
            localStorage.setItem('chatName', myName);
            document.getElementById('display-name').innerText = myName;

            const map = L.map('map').setView([47.6, 13.3], 7);
            const tunnelUrl = 'https://eddie-cigarette-cleared-tooth.trycloudflare.com';
            L.tileLayer(tunnelUrl + '/styles/basic-preview/{z}/{x}/{y}.png', { maxZoom: 20 }).addTo(map);

            // Geocoder sicher laden
            if (typeof L.Control.Geocoder !== 'undefined') {
                L.Control.geocoder().addTo(map);
            }

            const ROOM = "at-stable-v8-";
            const myId = ROOM + Math.floor(Math.random() * 10000);
            let peer = null;
            let connections = {};
            let markers = {};

            function startPeer() {
                if (peer) peer.destroy();
                
                // Wir nutzen den Standard-Server, aber mit Fehler-Bremse
                peer = new Peer(myId, { debug: 1 });

                peer.on('open', (id) => {
                    document.getElementById('status').innerText = "✅ Online";
                    document.getElementById('status').style.color = "green";
                    log("ID: " + id);
                    setInterval(findPeers, 10000);
                });

                peer.on('error', (err) => {
                    document.getElementById('status').innerText = "❌ " + err.type;
                    document.getElementById('status').style.color = "red";
                    log("Fehler: " + err.type);
                    if (err.type === 'network') {
                        // 15 Sek Pause bei Netzwerkfehler
                        setTimeout(startPeer, 15000);
                    }
                });

                peer.on('connection', setupConn);
            }

            function setupConn(conn) {
                connections[conn.peer] = conn;
                conn.on('data', (data) => {
                    if (data.lat && data.lon) {
                        if (!markers[conn.peer]) {
                            markers[conn.peer] = L.marker([data.lat, data.lon]).addTo(map)
                                .bindTooltip(data.name || "Partner", {permanent:true});
                        } else {
                            markers[conn.peer].setLatLng([data.lat, data.lon]);
                        }
                    }
                    document.getElementById('peer-count').innerText = Object.values(connections).filter(c=>c.open).length;
                });
            }

            function findPeers() {
                // Nur Scannen wenn wir selbst online sind
                if (!peer || peer.disconnected) return;
                for (let i = 0; i < 10; i++) {
                    let tid = ROOM + i; // Versuche Standard-Slots zu finden
                    if (tid !== myId && (!connections[tid] || !connections[tid].open)) {
                        setupConn(peer.connect(tid));
                    }
                }
            }

            map.locate({watch: true, setView: true, maxZoom: 16});
            map.on('locationfound', (e) => {
                let pos = { lat: e.latlng.lat, lon: e.latlng.lng, name: myName };
                if (!markers["me"]) {
                    markers["me"] = L.marker(e.latlng).addTo(map).bindTooltip("Ich", {permanent:true});
                } else {
                    markers["me"].setLatLng(e.latlng);
                }
                Object.values(connections).forEach(c => { if(c.open) c.send(pos); });
            });

            startPeer();
        };
    </script>
</body>
</html>
