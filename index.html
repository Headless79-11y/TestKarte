<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Team-Karte Live</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>

    <style>
        body, html { margin: 0; padding: 0; height: 100%; font-family: Arial, sans-serif; }
        #map { height: 100vh; width: 100%; background: #e0e0e0; }
        
        .overlay {
            position: absolute; top: 10px; right: 10px; z-index: 1000;
            background: white; padding: 15px; border-radius: 10px;
            box-shadow: 0 2px 15px rgba(0,0,0,0.2); border: 1px solid #ccc;
        }
        .status-dot { height: 10px; width: 10px; border-radius: 50%; display: inline-block; background: red; }
        .online { background: #2ecc71; }
    </style>
</head>
<body>

    <div class="overlay">
        <strong>Status:</strong> <span id="status-text">Verbinde...</span> <span id="dot" class="status-dot"></span><br>
        <strong>Dein Name:</strong> <span id="my-name-display">...</span><br>
        <hr>
        <strong>Partner auf Karte:</strong> <span id="peer-count">0</span>
    </div>

    <div id="map"></div>

    <script>
        // 1. SETUP: Name und Karte
        const myName = prompt("Dein Name für die Karte:", "User-" + Math.floor(Math.random()*100));
        document.getElementById('my-name-display').innerText = myName;

        const map = L.map('map').setView([47.6, 13.3], 7);
        const tunnelUrl = 'https://eddie-cigarette-cleared-tooth.trycloudflare.com';
        
        // Dein eigener Karten-Server mit Fallback auf OpenStreetMap
        L.tileLayer(tunnelUrl + '/styles/basic-preview/{z}/{x}/{y}.png', {
            maxZoom: 20,
            errorTileUrl: 'https://tile.openstreetmap.org/{z}/{x}/{y}.png'
        }).addTo(map);

        // 2. NETZWERK: Wer bin ich?
        // WICHTIG: Jedes Gerät braucht eine EIGENE Nummer (Slot).
        const slot = prompt("Wähle eine Nummer (1-10):", "1");
        const myId = "austria-team-slot-" + slot;
        const peer = new Peer(myId);

        let markers = {}; // Speichert alle Marker (Ich + Partner)
        let connections = {};

        peer.on('open', (id) => {
            document.getElementById('status-text').innerText = "Bereit (Slot " + slot + ")";
            document.getElementById('dot').classList.add('online');
            
            // Suche alle 10 Sekunden nach den Slots 1 bis 10
            setInterval(searchFriends, 10000);
        });

        // 3. STANDORT: Wo bin ich?
        map.locate({ watch: true, setView: true, maxZoom: 15 });

        map.on('locationfound', (e) => {
            const myPos = { lat: e.latlng.lat, lon: e.latlng.lng, name: myName };
            
            // Eigenen Marker zeichnen
            updateMarker('me', myPos, "blue");
            
            // Position an alle Freunde schicken
            Object.values(connections).forEach(conn => {
                if (conn.open) conn.send(myPos);
            });
        });

        // 4. KOMMUNIKATION: Nachrichten empfangen
        peer.on('connection', (conn) => {
            setupConnection(conn);
        });

        function setupConnection(conn) {
            connections[conn.peer] = conn;
            conn.on('data', (data) => {
                if (data.lat && data.lon) {
                    updateMarker(conn.peer, data, "red");
                }
            });
            conn.on('close', () => {
                if (markers[conn.peer]) map.removeLayer(markers[conn.peer]);
                delete connections[conn.peer];
                updateUI();
            });
        }

        function searchFriends() {
            for (let i = 1; i <= 10; i++) {
                const targetId = "austria-team-slot-" + i;
                if (targetId !== myId && (!connections[targetId] || !connections[targetId].open)) {
                    const conn = peer.connect(targetId);
                    setupConnection(conn);
                }
            }
            updateUI();
        }

        function updateMarker(id, data, color) {
            const label = id === 'me' ? "Ich (" + data.name + ")" : data.name;
            
            if (!markers[id]) {
                markers[id] = L.marker([data.lat, data.lon]).addTo(map)
                    .bindTooltip(label, { permanent: true, direction: 'top' });
                
                // Farbe ändern wenn es nicht "ich" bin (einfacher Kreis-Marker)
                if (id !== 'me') {
                    markers[id].setIcon(L.divIcon({
                        className: 'custom-div-icon',
                        html: "<div style='background-color:red; width:12px; height:12px; border-radius:50%; border:2px solid white;'></div>",
                        iconSize: [12, 12], iconAnchor: [6, 6]
                    }));
                }
            } else {
                markers[id].setLatLng([data.lat, data.lon]);
            }
        }

        function updateUI() {
            const count = Object.values(connections).filter(c => c.open).length;
            document.getElementById('peer-count').innerText = count;
        }

        // Falls GPS nicht geht
        map.on('locationerror', () => {
            alert("Bitte aktiviere GPS, damit man dich sehen kann!");
        });
    </script>
</body>
</html>
