<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Map5 - Stable</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet-control-geocoder/dist/Control.Geocoder.css" />
    <style>
        body, html { margin: 0; padding: 0; height: 100%; font-family: sans-serif; overflow: hidden; }
        #map { height: 100vh; width: 100%; background: #eee; }
        .status-box {
            position: absolute; bottom: 20px; right: 10px; z-index: 1000;
            background: white; padding: 15px; border-radius: 8px; border: 1px solid #333;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3); min-width: 180px;
        }
    </style>
</head>
<body>
    <div class="status-box">
        <strong>Gerät:</strong> <span id="display-name">...</span><br>
        <strong>Netzwerk:</strong> <span id="status" style="color: orange;">Initialisiere...</span><br>
        <strong>Partner:</strong> <span id="peer-count">0</span>
        <div id="debug-log" style="font-size: 10px; color: #666; margin-top: 5px;"></div>
    </div>
    <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://unpkg.com/leaflet-control-geocoder/dist/Control.Geocoder.js"></script>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>

            }).addTo(map);

                L.Control.geocoder().addTo(map);
            }
